version: '3.8'

services:
  # [THE HEART]: Rust Kinetic Engine
  engine:
    build: ./services/engine
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
    networks:
      - spacedeck-net

  # [THE BRAIN]: Python API Orchestrator
  api:
    build: ./services/api
    ports:
      - "8000:8000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
      - KINETIC_HEART_URL=http://engine:8080
    depends_on:
      - engine
    networks:
      - spacedeck-net

  # [THE VESSEL]: Next.js Frontend
  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    networks:
      - spacedeck-net

networks:
  spacedeck-net:
    driver: bridge
